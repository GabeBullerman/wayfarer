<mat-sidenav-container class="shell-container">
  <mat-sidenav
    #sidenav
    [mode]="(isMobile$ | async) ? 'over' : 'side'"
    [opened]="!(isMobile$ | async)"
    class="shell-sidenav"
  >
    <div class="sidenav-header">
      <img src="ClearLogoWhiteCircle.png" alt="SorTrek" class="brand-logo brand-logo--light" />
      <img src="BlackLogoNoBackground.png" alt="SorTrek" class="brand-logo brand-logo--dark" />
    </div>

    <mat-nav-list>
      @for (item of navItems; track item.route) {
        <a mat-list-item [routerLink]="item.route" routerLinkActive="active-link"
           (click)="sidenav.close()">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>

    <div class="sidenav-footer">
      @if (currentUser$ | async; as user) {
        <div class="user-chip">
          <mat-icon>account_circle</mat-icon>
          <span class="user-name">{{ user.displayName || user.email }}</span>
        </div>
      }
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="shell-content">
    <mat-toolbar class="shell-toolbar" color="primary">
      <button mat-icon-button (click)="sidenav.toggle()" matTooltip="Toggle menu" aria-label="Toggle menu">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-spacer"></span>
      <!-- Animated theme toggle (Within) — desktop toolbar only; on mobile it
           moves into the sidenav menu so the toolbar isn't overcrowded. -->
      @if (!(isMobile$ | async)) {
        <app-theme-toggle />
      }

      <!-- Guide -->
      <button mat-icon-button (click)="openGuide()" matTooltip="Feature guide" aria-label="Feature guide">
        <mat-icon>help_outline</mat-icon>
      </button>

      <!-- Currency converter popover -->
      <button mat-icon-button [matMenuTriggerFor]="converterMenu" matTooltip="Currency converter" aria-label="Currency converter">
        <mat-icon>currency_exchange</mat-icon>
      </button>
      <mat-menu #converterMenu xPosition="before">
        <div (click)="$event.stopPropagation()">
          <app-currency-converter />
        </div>
      </mat-menu>

      @if (currentUser$ | async; as user) {
        <button mat-icon-button [routerLink]="'/profile'" matTooltip="Profile" aria-label="Profile">
          <mat-icon>account_circle</mat-icon>
        </button>
        <button mat-icon-button [matMenuTriggerFor]="userMenu" matTooltip="Account" aria-label="Account menu">
          <mat-icon>more_vert</mat-icon>
        </button>
        <mat-menu #userMenu>
          <div class="user-menu-header">
            <strong>{{ user.displayName || 'Traveler' }}</strong>
            <small>{{ user.email }}</small>
          </div>
          <mat-divider></mat-divider>
          <button mat-menu-item [routerLink]="'/profile'">
            <mat-icon>manage_accounts</mat-icon> Profile
          </button>
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon> Sign Out
          </button>
        </mat-menu>
      }
    </mat-toolbar>

    <div class="page-content">
      <router-outlet />
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>

<app-pwa-install-prompt />
