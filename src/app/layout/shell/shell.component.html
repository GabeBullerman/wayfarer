<mat-sidenav-container class="shell-container">
  <mat-sidenav
    #sidenav
    [mode]="(isMobile$ | async) ? 'over' : 'side'"
    [opened]="!(isMobile$ | async)"
    class="shell-sidenav"
  >
    <div class="sidenav-header">
      <img src="Logo.png" alt="Wayfarer" class="brand-logo" />
    </div>

    <mat-nav-list>
      @for (item of navItems; track item.route) {
        <a mat-list-item [routerLink]="item.route" routerLinkActive="active-link"
           (click)="sidenav.close()">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>

    <div class="sidenav-footer">
      @if (currentUser$ | async; as user) {
        <div class="user-chip">
          <mat-icon>account_circle</mat-icon>
          <span class="user-name">{{ user.displayName || user.email }}</span>
        </div>
      }
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="shell-content">
    <mat-toolbar class="shell-toolbar" color="primary">
      <button mat-icon-button (click)="sidenav.toggle()" matTooltip="Toggle menu">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-spacer"></span>
      @if (currentUser$ | async; as user) {
        <button mat-icon-button [matMenuTriggerFor]="userMenu" matTooltip="Account">
          <mat-icon>account_circle</mat-icon>
        </button>
        <mat-menu #userMenu>
          <div class="user-menu-header">
            <strong>{{ user.displayName || 'Traveler' }}</strong>
            <small>{{ user.email }}</small>
          </div>
          <mat-divider></mat-divider>
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon> Sign Out
          </button>
        </mat-menu>
      }
    </mat-toolbar>

    <div class="page-content">
      <router-outlet />
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
