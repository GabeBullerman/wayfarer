<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <style>
    .form{animation:fadeUp .4s .05s ease both}
    .t1{animation:fadeUp .4s .3s ease both}
    .t2{animation:fadeUp .4s .55s ease both}
    .local{animation:fadeUp .4s .8s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  </style>
  <rect width="680" height="300" fill="#f0f2fb"/>
  <rect width="680" height="50" fill="#1a237e"/>
  <text x="24" y="22" fill="white" font-size="11" font-weight="700" letter-spacing="1">PARIS TRIP</text>
  <text x="24" y="40" fill="#9fa8da" font-size="13">Transport</text>

  <!-- toggle bar -->
  <g class="form">
    <rect x="16" y="58" width="648" height="32" rx="8" fill="white" filter="url(#sh)"/>
    <rect x="18" y="60" width="148" height="28" rx="6" fill="#1a237e"/>
    <text x="92" y="78" fill="white" font-size="11" font-weight="700" text-anchor="middle">🚆 Trains</text>
    <text x="260" y="78" fill="#757575" font-size="11" text-anchor="middle">✈ Flights</text>
    <text x="420" y="78" fill="#757575" font-size="11" text-anchor="middle">🏨 Hotels</text>
  </g>

  <!-- train result 1 -->
  <g class="t1">
    <rect x="16" y="100" width="648" height="70" rx="10" fill="white" filter="url(#sh)"/>
    <rect x="16" y="100" width="6" height="70" rx="3 0 0 3" fill="#1a237e"/>
    <!-- from/to times -->
    <text x="36" y="122" fill="#212121" font-size="16" font-weight="700">07:43</text>
    <text x="36" y="140" fill="#757575" font-size="10">Paris Gare du Nord</text>
    <text x="36" y="156" fill="#9e9e9e" font-size="9">Platform 12</text>
    <!-- arrow -->
    <line x1="165" y1="131" x2="310" y2="131" stroke="#c5cae9" stroke-width="1.5"/>
    <polygon points="310,127 318,131 310,135" fill="#c5cae9"/>
    <text x="240" y="124" fill="#5c6bc0" font-size="9" text-anchor="middle">2h 17m</text>
    <text x="240" y="140" fill="#9e9e9e" font-size="9" text-anchor="middle">Eurostar · direct</text>
    <!-- arrival -->
    <text x="330" y="122" fill="#212121" font-size="16" font-weight="700">10:00</text>
    <text x="330" y="140" fill="#757575" font-size="10">London St Pancras</text>
    <text x="330" y="156" fill="#9e9e9e" font-size="9">Platform 6</text>
    <!-- price + button -->
    <text x="510" y="126" fill="#1a237e" font-size="15" font-weight="700">€ 89</text>
    <rect x="576" y="110" width="74" height="28" rx="14" fill="#1a237e"/>
    <text x="613" y="128" fill="white" font-size="10" font-weight="700" text-anchor="middle">Add</text>
  </g>

  <!-- train result 2 -->
  <g class="t2">
    <rect x="16" y="180" width="648" height="58" rx="10" fill="white" filter="url(#sh)"/>
    <rect x="16" y="180" width="6" height="58" rx="3 0 0 3" fill="#5c6bc0"/>
    <text x="36" y="202" fill="#212121" font-size="14" font-weight="700">09:13</text>
    <text x="36" y="218" fill="#757575" font-size="10">Paris Gare du Nord</text>
    <line x1="160" y1="208" x2="300" y2="208" stroke="#c5cae9" stroke-width="1.5"/>
    <polygon points="300,204 308,208 300,212" fill="#c5cae9"/>
    <text x="230" y="202" fill="#5c6bc0" font-size="9" text-anchor="middle">2h 22m · 1 stop</text>
    <text x="320" y="202" fill="#212121" font-size="14" font-weight="700">11:35</text>
    <text x="320" y="218" fill="#757575" font-size="10">London St Pancras</text>
    <text x="510" y="206" fill="#1a237e" font-size="13" font-weight="700">€ 64</text>
    <rect x="576" y="191" width="74" height="26" rx="13" fill="#e8eaf6"/>
    <text x="613" y="208" fill="#1a237e" font-size="10" font-weight="700" text-anchor="middle">Add</text>
  </g>

  <!-- local options strip -->
  <g class="local">
    <text x="24" y="256" fill="#9e9e9e" font-size="10" font-weight="700" letter-spacing=".5">LOCAL OPTIONS NEAR DESTINATION</text>
    <rect x="16" y="262" width="100" height="28" rx="8" fill="white" filter="url(#sh)"/>
    <text x="66" y="280" fill="#424242" font-size="10" text-anchor="middle">🚴 Vélib'</text>
    <rect x="126" y="262" width="110" height="28" rx="8" fill="white" filter="url(#sh)"/>
    <text x="181" y="280" fill="#424242" font-size="10" text-anchor="middle">🚌 Bus 63</text>
    <rect x="246" y="262" width="120" height="28" rx="8" fill="white" filter="url(#sh)"/>
    <text x="306" y="280" fill="#424242" font-size="10" text-anchor="middle">🚇 Métro Line 1</text>
    <rect x="376" y="262" width="110" height="28" rx="8" fill="white" filter="url(#sh)"/>
    <text x="431" y="280" fill="#424242" font-size="10" text-anchor="middle">🚗 Europcar</text>
  </g>

  <defs>
    <filter id="sh" x="-2%" y="-5%" width="104%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0000001a"/>
    </filter>
  </defs>
</svg>
