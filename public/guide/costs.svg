<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <style>
    .bar1{animation:growH .6s .15s ease both}
    .bar2{animation:growH .6s .3s ease both}
    .bar3{animation:growH .6s .45s ease both}
    .bar4{animation:growH .6s .6s ease both}
    .bar5{animation:growH .6s .75s ease both}
    .exp{animation:fadeUp .4s .9s ease both}
    .total{animation:fadeUp .4s 1.1s ease both}
    @keyframes growH{from{transform:scaleX(0);transform-origin:left}to{transform:scaleX(1);transform-origin:left}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  </style>
  <rect width="680" height="300" fill="#f0f2fb"/>
  <rect width="680" height="50" fill="#1a237e"/>
  <text x="24" y="22" fill="white" font-size="11" font-weight="700" letter-spacing="1">PARIS TRIP</text>
  <text x="24" y="40" fill="#9fa8da" font-size="13">Costs &amp; Currency</text>

  <!-- left: bar chart -->
  <text x="24" y="75" fill="#9e9e9e" font-size="10" font-weight="700" letter-spacing=".5">SPEND BY CATEGORY</text>

  <!-- Flights -->
  <text x="24" y="96" fill="#616161" font-size="10">✈ Flights</text>
  <rect x="110" y="84" width="200" height="14" rx="7" fill="#e8eaf6"/>
  <rect x="110" y="84" width="200" height="14" rx="7" fill="#3949ab" class="bar1"/>
  <text x="318" y="96" fill="#3949ab" font-size="10" font-weight="700">€ 340</text>

  <!-- Accommodation -->
  <text x="24" y="118" fill="#616161" font-size="10">🏨 Hotel</text>
  <rect x="110" y="106" width="160" height="14" rx="7" fill="#e8eaf6"/>
  <rect x="110" y="106" width="160" height="14" rx="7" fill="#7986cb" class="bar2"/>
  <text x="278" y="118" fill="#3949ab" font-size="10" font-weight="700">€ 272</text>

  <!-- Food -->
  <text x="24" y="140" fill="#616161" font-size="10">🍽 Food</text>
  <rect x="110" y="128" width="110" height="14" rx="7" fill="#e8eaf6"/>
  <rect x="110" y="128" width="110" height="14" rx="7" fill="#42a5f5" class="bar3"/>
  <text x="228" y="140" fill="#1565c0" font-size="10" font-weight="700">€ 188</text>

  <!-- Transport -->
  <text x="24" y="162" fill="#616161" font-size="10">🚇 Transport</text>
  <rect x="110" y="150" width="72" height="14" rx="7" fill="#e8eaf6"/>
  <rect x="110" y="150" width="72" height="14" rx="7" fill="#66bb6a" class="bar4"/>
  <text x="190" y="162" fill="#2e7d32" font-size="10" font-weight="700">€ 94</text>

  <!-- Activities -->
  <text x="24" y="184" fill="#616161" font-size="10">🎭 Activities</text>
  <rect x="110" y="172" width="54" height="14" rx="7" fill="#e8eaf6"/>
  <rect x="110" y="172" width="54" height="14" rx="7" fill="#ffa726" class="bar5"/>
  <text x="172" y="184" fill="#e65100" font-size="10" font-weight="700">€ 56</text>

  <!-- divider -->
  <line x1="370" y1="60" x2="370" y2="290" stroke="#e0e0e0" stroke-width="1"/>

  <!-- right: recent expenses list -->
  <g class="exp">
    <text x="386" y="75" fill="#9e9e9e" font-size="10" font-weight="700" letter-spacing=".5">RECENT EXPENSES</text>
    <rect x="382" y="80" width="282" height="44" rx="8" fill="white" filter="url(#sh)"/>
    <text x="398" y="98" fill="#212121" font-size="11" font-weight="600">Café de Flore</text>
    <text x="398" y="114" fill="#9e9e9e" font-size="9">Today · Food &amp; Drink</text>
    <text x="644" y="106" fill="#1a237e" font-size="12" font-weight="700" text-anchor="end">€ 22.50</text>

    <rect x="382" y="132" width="282" height="44" rx="8" fill="white" filter="url(#sh)"/>
    <text x="398" y="150" fill="#212121" font-size="11" font-weight="600">Louvre Museum Ticket</text>
    <text x="398" y="166" fill="#9e9e9e" font-size="9">Yesterday · Activities</text>
    <text x="644" y="158" fill="#1a237e" font-size="12" font-weight="700" text-anchor="end">€ 17.00</text>

    <rect x="382" y="184" width="282" height="44" rx="8" fill="white" filter="url(#sh)"/>
    <text x="398" y="202" fill="#212121" font-size="11" font-weight="600">Métro Day Pass</text>
    <text x="398" y="218" fill="#9e9e9e" font-size="9">Yesterday · Transport</text>
    <text x="644" y="210" fill="#1a237e" font-size="12" font-weight="700" text-anchor="end">€ 14.90</text>
  </g>

  <!-- total -->
  <g class="total">
    <rect x="16" y="240" width="340" height="46" rx="10" fill="#1a237e"/>
    <text x="36" y="259" fill="#9fa8da" font-size="10">Total spent</text>
    <text x="36" y="278" fill="white" font-size="18" font-weight="700">€ 950 <tspan font-size="11" fill="#c5cae9">/ € 1,400 budget</tspan></text>
    <rect x="382" y="240" width="282" height="46" rx="10" fill="white" filter="url(#sh)"/>
    <text x="398" y="259" fill="#9e9e9e" font-size="10">GBP → EUR today</text>
    <text x="398" y="278" fill="#1a237e" font-size="17" font-weight="700">1 £ = 1.172 €</text>
    <text x="640" y="278" fill="#66bb6a" font-size="10" font-weight="700" text-anchor="end">Live ●</text>
  </g>

  <defs>
    <filter id="sh" x="-2%" y="-5%" width="104%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0000001a"/>
    </filter>
  </defs>
</svg>
