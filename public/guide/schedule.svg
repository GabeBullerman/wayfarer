<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <style>
    .row{opacity:0}
    .r1{animation:slideIn .4s .1s ease both}
    .r2{animation:slideIn .4s .3s ease both}
    .r3{animation:slideIn .4s .5s ease both}
    .r4{animation:slideIn .4s .7s ease both}
    .gap{animation:slideIn .4s .9s ease both}
    @keyframes slideIn{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
    .pulse{animation:pulse 2s 1.2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  </style>
  <rect width="680" height="300" fill="#f0f2fb"/>

  <!-- day header -->
  <rect x="0" y="0" width="680" height="50" fill="#1a237e"/>
  <text x="24" y="22" fill="white" font-size="11" font-weight="700" letter-spacing="1">PARIS TRIP</text>
  <text x="24" y="40" fill="#9fa8da" font-size="13">Day 2 — Wednesday, Jun 21</text>
  <text x="600" y="31" fill="#c5cae9" font-size="12">+ Add</text>

  <!-- timeline line -->
  <line x1="52" y1="60" x2="52" y2="292" stroke="#c5cae9" stroke-width="2"/>

  <!-- item 1 -->
  <g class="row r1">
    <circle cx="52" cy="80" r="7" fill="#1a237e"/>
    <text x="52" y="61" fill="#9e9e9e" font-size="10" text-anchor="middle">08:30</text>
    <rect x="72" y="64" width="580" height="36" rx="8" fill="white" filter="url(#sh)"/>
    <rect x="72" y="64" width="6" height="36" rx="3 0 0 3" fill="#42a5f5"/>
    <text x="90" y="78" fill="#212121" font-size="12" font-weight="600">Breakfast at Café de Flore</text>
    <text x="90" y="93" fill="#9e9e9e" font-size="10">🍳 Food &amp; Drink · Saint-Germain-des-Prés</text>
  </g>

  <!-- item 2 -->
  <g class="row r2">
    <circle cx="52" cy="140" r="7" fill="#1a237e"/>
    <text x="52" y="121" fill="#9e9e9e" font-size="10" text-anchor="middle">10:00</text>
    <rect x="72" y="124" width="580" height="36" rx="8" fill="white" filter="url(#sh)"/>
    <rect x="72" y="124" width="6" height="36" rx="3 0 0 3" fill="#ab47bc"/>
    <text x="90" y="138" fill="#212121" font-size="12" font-weight="600">Eiffel Tower Visit</text>
    <text x="90" y="153" fill="#9e9e9e" font-size="10">🗺 Sightseeing · Champ de Mars · 2h 30m</text>
  </g>

  <!-- item 3 -->
  <g class="row r3">
    <circle cx="52" cy="200" r="7" fill="#1a237e"/>
    <text x="52" y="181" fill="#9e9e9e" font-size="10" text-anchor="middle">14:00</text>
    <rect x="72" y="184" width="580" height="36" rx="8" fill="white" filter="url(#sh)"/>
    <rect x="72" y="184" width="6" height="36" rx="3 0 0 3" fill="#66bb6a"/>
    <text x="90" y="198" fill="#212121" font-size="12" font-weight="600">Louvre Museum</text>
    <text x="90" y="213" fill="#9e9e9e" font-size="10">🏛 Culture · 3h · Pre-book tickets</text>
  </g>

  <!-- transport gap warning -->
  <g class="row gap">
    <rect x="72" y="238" width="580" height="38" rx="8" fill="#fff8e1" stroke="#ffb300" stroke-width="1"/>
    <text x="92" y="253" fill="#f57f17" font-size="11" font-weight="700">⚠  No transport planned for arrival day</text>
    <text x="92" y="268" fill="#f57f17" font-size="10">Find Options  ·  Add Manually</text>
    <circle cx="632" cy="257" r="5" fill="#ff9800" class="pulse"/>
  </g>

  <defs>
    <filter id="sh" x="-2%" y="-10%" width="104%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0000001a"/>
    </filter>
  </defs>
</svg>
