<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <style>
    .phone{animation:fadeUp .5s .05s ease both}
    .prompt{animation:slideUp .5s .5s ease both}
    .badge{animation:pop .4s .9s ease both}
    .check1{animation:fadeUp .3s 1.0s ease both}
    .check2{animation:fadeUp .3s 1.15s ease both}
    .check3{animation:fadeUp .3s 1.3s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pop{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
    .offline-pulse{animation:pulse 2s 1.4s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  </style>
  <rect width="680" height="300" fill="#f0f2fb"/>
  <rect width="680" height="50" fill="#1a237e"/>
  <text x="24" y="22" fill="white" font-size="11" font-weight="700" letter-spacing="1">Sortrek</text>
  <text x="24" y="40" fill="#9fa8da" font-size="13">Offline &amp; PWA</text>

  <!-- phone mockup -->
  <g class="phone">
    <rect x="220" y="58" width="130" height="220" rx="16" fill="#212121"/>
    <rect x="226" y="66" width="118" height="196" rx="10" fill="#e8eaf6"/>
    <!-- mini app UI inside phone -->
    <rect x="226" y="66" width="118" height="28" rx="10 10 0 0" fill="#1a237e"/>
    <text x="285" y="85" fill="white" font-size="8" font-weight="700" text-anchor="middle">Sortrek</text>
    <!-- trip card in phone -->
    <rect x="232" y="100" width="106" height="56" rx="6" fill="white"/>
    <rect x="232" y="100" width="106" height="22" rx="6 6 0 0" fill="#3949ab"/>
    <text x="285" y="115" fill="white" font-size="7" font-weight="700" text-anchor="middle">Paris</text>
    <text x="285" y="127" fill="#9fa8da" font-size="6" text-anchor="middle">France</text>
    <text x="240" y="140" fill="#616161" font-size="7">Jun 20 – Jun 27</text>
    <text x="240" y="152" fill="#616161" font-size="7">7 nights · EUR</text>
    <!-- offline badge -->
    <rect x="232" y="164" width="106" height="24" rx="6" fill="#e8f5e9"/>
    <text x="285" y="180" fill="#2e7d32" font-size="8" font-weight="700" text-anchor="middle">📶 Available Offline</text>
    <!-- home indicator -->
    <rect x="265" y="270" width="40" height="3" rx="2" fill="#424242"/>
  </g>

  <!-- install prompt toast -->
  <g class="prompt">
    <rect x="16" y="218" width="190" height="70" rx="14" fill="white" filter="url(#sh)"/>
    <rect x="16" y="218" width="190" height="70" rx="14" fill="white"/>
    <rect x="16" y="218" width="190" height="4" rx="14 14 0 0" fill="#1a237e"/>
    <circle cx="44" cy="248" r="14" fill="#e8eaf6"/>
    <text x="44" y="253" fill="#1a237e" font-size="14" text-anchor="middle">W</text>
    <text x="68" y="242" fill="#212121" font-size="11" font-weight="700">Add to Home Screen</text>
    <text x="68" y="256" fill="#9e9e9e" font-size="9">Install Sortrek as an app</text>
    <rect x="24" y="266" width="76" height="16" rx="8" fill="#1a237e"/>
    <text x="62" y="278" fill="white" font-size="9" font-weight="700" text-anchor="middle">Install</text>
    <rect x="112" y="266" width="86" height="16" rx="8" fill="#f5f5f5"/>
    <text x="155" y="278" fill="#616161" font-size="9" font-weight="700" text-anchor="middle">Not Now</text>
  </g>

  <!-- offline indicator -->
  <g class="badge">
    <rect x="462" y="68" width="192" height="42" rx="10" fill="#e8f5e9" filter="url(#sh)"/>
    <text x="478" y="86" fill="#2e7d32" font-size="11" font-weight="700">✓  Works Offline</text>
    <text x="478" y="102" fill="#4caf50" font-size="10">Trips cached via IndexedDB</text>
  </g>

  <!-- capability list -->
  <g class="check1">
    <rect x="462" y="120" width="192" height="34" rx="8" fill="white" filter="url(#sh)"/>
    <circle cx="482" cy="137" r="9" fill="#e8f5e9"/>
    <text x="482" y="141" fill="#2e7d32" font-size="10" text-anchor="middle">✓</text>
    <text x="500" y="141" fill="#424242" font-size="10">Itinerary available offline</text>
  </g>
  <g class="check2">
    <rect x="462" y="162" width="192" height="34" rx="8" fill="white" filter="url(#sh)"/>
    <circle cx="482" cy="179" r="9" fill="#e8f5e9"/>
    <text x="482" y="183" fill="#2e7d32" font-size="10" text-anchor="middle">✓</text>
    <text x="500" y="183" fill="#424242" font-size="10">Bookings cached locally</text>
  </g>
  <g class="check3">
    <rect x="462" y="204" width="192" height="34" rx="8" fill="white" filter="url(#sh)"/>
    <circle cx="482" cy="221" r="9" fill="#e8f5e9"/>
    <text x="482" y="225" fill="#2e7d32" font-size="10" text-anchor="middle">✓</text>
    <text x="500" y="225" fill="#424242" font-size="10">Syncs when back online</text>
  </g>

  <!-- offline mode indicator -->
  <rect x="462" y="248" width="192" height="32" rx="8" fill="#fff3e0" filter="url(#sh)"/>
  <circle cx="476" cy="264" r="6" fill="#ff9800" class="offline-pulse"/>
  <text x="490" y="268" fill="#e65100" font-size="10" font-weight="600">Production only (Vercel deploy)</text>

  <defs>
    <filter id="sh" x="-4%" y="-6%" width="108%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0000001a"/>
    </filter>
  </defs>
</svg>
