<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <style>
    .d1{animation:fadeUp .4s .1s ease both}
    .d2{animation:fadeUp .4s .3s ease both}
    .d3{animation:fadeUp .4s .5s ease both}
    .d4{animation:fadeUp .4s .7s ease both}
    .upload{animation:fadeUp .4s .9s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .warn{animation:pulse 2s 1.2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  </style>
  <rect width="680" height="300" fill="#f0f2fb"/>
  <rect width="680" height="50" fill="#1a237e"/>
  <text x="24" y="22" fill="white" font-size="11" font-weight="700" letter-spacing="1">PARIS TRIP</text>
  <text x="24" y="40" fill="#9fa8da" font-size="13">Document Vault</text>
  <rect x="600" y="14" width="64" height="24" rx="12" fill="#3949ab"/>
  <text x="632" y="30" fill="white" font-size="11" font-weight="600" text-anchor="middle">Upload</text>

  <!-- doc card 1 -->
  <g class="d1">
    <rect x="16" y="60" width="148" height="110" rx="10" fill="white" filter="url(#sh)"/>
    <rect x="16" y="60" width="148" height="52" rx="10 10 0 0" fill="#e8eaf6"/>
    <text x="90" y="93" font-size="32" text-anchor="middle">🛂</text>
    <text x="90" y="128" fill="#212121" font-size="11" font-weight="700" text-anchor="middle">Passport</text>
    <text x="90" y="143" fill="#757575" font-size="9" text-anchor="middle">Expires Mar 2029</text>
    <rect x="32" y="153" width="64" height="14" rx="7" fill="#e8f5e9"/>
    <text x="64" y="163" fill="#2e7d32" font-size="8" font-weight="700" text-anchor="middle">VALID</text>
  </g>

  <!-- doc card 2 -->
  <g class="d2">
    <rect x="176" y="60" width="148" height="110" rx="10" fill="white" filter="url(#sh)"/>
    <rect x="176" y="60" width="148" height="52" rx="10 10 0 0" fill="#fff3e0"/>
    <text x="250" y="93" font-size="32" text-anchor="middle">🏥</text>
    <text x="250" y="128" fill="#212121" font-size="11" font-weight="700" text-anchor="middle">Travel Insurance</text>
    <text x="250" y="143" fill="#757575" font-size="9" text-anchor="middle">Expires Jul 2026</text>
    <rect x="192" y="153" width="64" height="14" rx="7" fill="#e8f5e9"/>
    <text x="224" y="163" fill="#2e7d32" font-size="8" font-weight="700" text-anchor="middle">VALID</text>
  </g>

  <!-- doc card 3 — expiring soon -->
  <g class="d3">
    <rect x="336" y="60" width="148" height="110" rx="10" fill="white" stroke="#ffb300" stroke-width="1.5" filter="url(#sh)"/>
    <rect x="336" y="60" width="148" height="52" rx="10 10 0 0" fill="#fff8e1"/>
    <text x="410" y="93" font-size="32" text-anchor="middle">📋</text>
    <text x="410" y="128" fill="#212121" font-size="11" font-weight="700" text-anchor="middle">Schengen Visa</text>
    <text x="410" y="143" fill="#e65100" font-size="9" text-anchor="middle" class="warn">Expires in 42 days</text>
    <rect x="352" y="153" width="96" height="14" rx="7" fill="#fff3e0"/>
    <text x="400" y="163" fill="#e65100" font-size="8" font-weight="700" text-anchor="middle">EXPIRING SOON</text>
  </g>

  <!-- doc card 4 -->
  <g class="d4">
    <rect x="496" y="60" width="148" height="110" rx="10" fill="white" filter="url(#sh)"/>
    <rect x="496" y="60" width="148" height="52" rx="10 10 0 0" fill="#e8f5e9"/>
    <text x="570" y="93" font-size="32" text-anchor="middle">💉</text>
    <text x="570" y="128" fill="#212121" font-size="11" font-weight="700" text-anchor="middle">Vaccination Record</text>
    <text x="570" y="143" fill="#757575" font-size="9" text-anchor="middle">PDF · 2 pages</text>
    <rect x="512" y="153" width="64" height="14" rx="7" fill="#e8f5e9"/>
    <text x="544" y="163" fill="#2e7d32" font-size="8" font-weight="700" text-anchor="middle">VALID</text>
  </g>

  <!-- upload zone -->
  <g class="upload">
    <rect x="16" y="186" width="648" height="96" rx="10" fill="white" stroke="#c5cae9" stroke-width="1.5" stroke-dasharray="6,4" filter="url(#sh)"/>
    <text x="340" y="228" fill="#9fa8da" font-size="22" text-anchor="middle">☁</text>
    <text x="340" y="250" fill="#9e9e9e" font-size="11" text-anchor="middle" font-weight="600">Drop files here or click to upload</text>
    <text x="340" y="267" fill="#bdbdbd" font-size="10" text-anchor="middle">PDF, JPG, PNG up to 25 MB</text>
  </g>

  <defs>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="125%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0000001a"/>
    </filter>
  </defs>
</svg>
