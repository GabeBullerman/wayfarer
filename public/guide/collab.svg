<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <style>
    .u1{animation:fadeUp .4s .1s ease both}
    .u2{animation:fadeUp .4s .25s ease both}
    .u3{animation:fadeUp .4s .4s ease both}
    .form{animation:fadeUp .4s .6s ease both}
    .badge{animation:pop .4s .85s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
    .cursor{animation:blink .9s step-end infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  </style>
  <rect width="680" height="300" fill="#f0f2fb"/>
  <rect width="680" height="50" fill="#1a237e"/>
  <text x="24" y="22" fill="white" font-size="11" font-weight="700" letter-spacing="1">PARIS TRIP</text>
  <text x="24" y="40" fill="#9fa8da" font-size="13">People</text>

  <!-- section: collaborators -->
  <text x="24" y="74" fill="#9e9e9e" font-size="10" font-weight="700" letter-spacing=".5">COLLABORATORS</text>

  <!-- user row 1 - owner -->
  <g class="u1">
    <rect x="16" y="80" width="648" height="52" rx="10" fill="white" filter="url(#sh)"/>
    <circle cx="52" cy="106" r="18" fill="#3949ab"/>
    <text x="52" y="112" fill="white" font-size="14" font-weight="700" text-anchor="middle">G</text>
    <text x="80" y="100" fill="#212121" font-size="13" font-weight="600">Gabe Bullerman</text>
    <text x="80" y="118" fill="#9e9e9e" font-size="10">gabebullerman1@gmail.com</text>
    <rect x="560" y="91" width="88" height="20" rx="10" fill="#e8eaf6"/>
    <text x="604" y="105" fill="#3949ab" font-size="10" font-weight="700" text-anchor="middle">OWNER</text>
  </g>

  <!-- user row 2 -->
  <g class="u2">
    <rect x="16" y="140" width="648" height="52" rx="10" fill="white" filter="url(#sh)"/>
    <circle cx="52" cy="166" r="18" fill="#6a1b9a"/>
    <text x="52" y="172" fill="white" font-size="14" font-weight="700" text-anchor="middle">S</text>
    <text x="80" y="160" fill="#212121" font-size="13" font-weight="600">Sophie Martin</text>
    <text x="80" y="178" fill="#9e9e9e" font-size="10">sophie.martin@example.com</text>
    <rect x="540" y="151" width="108" height="20" rx="10" fill="#e8f5e9"/>
    <text x="594" y="165" fill="#2e7d32" font-size="10" font-weight="700" text-anchor="middle">COLLABORATOR</text>
    <text x="646" y="165" fill="#ef9a9a" font-size="14" text-anchor="middle">✕</text>
  </g>

  <!-- invite form -->
  <g class="form">
    <text x="24" y="216" fill="#9e9e9e" font-size="10" font-weight="700" letter-spacing=".5">INVITE BY EMAIL</text>
    <rect x="16" y="222" width="510" height="44" rx="10" fill="white" filter="url(#sh)"/>
    <text x="36" y="249" fill="#212121" font-size="12">alex.jones@example.com</text>
    <text x="280" y="249" fill="#bdbdbd" font-size="12" class="cursor">|</text>
    <rect x="538" y="222" width="126" height="44" rx="10" fill="#1a237e" filter="url(#sh)"/>
    <text x="601" y="249" fill="white" font-size="12" font-weight="700" text-anchor="middle">Send Invite</text>
  </g>

  <!-- shared badge on trips list hint -->
  <g class="badge">
    <rect x="16" y="278" width="200" height="18" rx="9" fill="#e8eaf6"/>
    <text x="116" y="291" fill="#3949ab" font-size="9" font-weight="700" text-anchor="middle">✦  Appears in collaborators' trip lists</text>
  </g>

  <defs>
    <filter id="sh" x="-2%" y="-5%" width="104%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0000001a"/>
    </filter>
  </defs>
</svg>
