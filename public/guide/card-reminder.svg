<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <style>
    .banner{animation:slideDown .5s .1s ease both}
    .i1{animation:fadeUp .35s .55s ease both}
    .i2{animation:fadeUp .35s .75s ease both}
    .i3{animation:fadeUp .35s .95s ease both}
    .notif{animation:slideUp .5s 1.2s ease both}
    @keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .pulse{animation:pulse 1.8s 1.5s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  </style>
  <rect width="680" height="300" fill="#f0f2fb"/>
  <rect width="680" height="50" fill="#1a237e"/>
  <text x="24" y="22" fill="white" font-size="11" font-weight="700" letter-spacing="1">PARIS TRIP</text>
  <text x="24" y="40" fill="#9fa8da" font-size="13">Overview</text>

  <!-- orange warning banner -->
  <g class="banner">
    <rect x="16" y="58" width="648" height="84" rx="12" fill="#fff8e1" stroke="#ffb300" stroke-width="1.5" filter="url(#sh)"/>
    <rect x="16" y="58" width="8" height="84" rx="4 0 0 4" fill="#ffa726"/>
    <!-- icon -->
    <text x="44" y="107" font-size="28" text-anchor="middle">💳</text>
    <text x="70" y="82" fill="#e65100" font-size="13" font-weight="700">Notify your bank before you travel</text>
    <text x="70" y="98" fill="#bf360c" font-size="11">Your trip to Paris starts in <tspan font-weight="700">8 days</tspan> — let your bank know to avoid blocked cards.</text>
    <text x="70" y="114" fill="#e65100" font-size="10">Enable browser notifications for a 48-hour reminder</text>
    <!-- dismiss -->
    <text x="636" y="78" fill="#ffa726" font-size="16" text-anchor="middle">✕</text>
  </g>

  <!-- checklist -->
  <text x="24" y="162" fill="#9e9e9e" font-size="10" font-weight="700" letter-spacing=".5">TRAVEL CHECKLIST</text>

  <g class="i1">
    <rect x="16" y="168" width="648" height="36" rx="8" fill="white" filter="url(#sh)"/>
    <circle cx="44" cy="186" r="10" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1.5"/>
    <text x="44" y="190" fill="#2e7d32" font-size="11" text-anchor="middle">✓</text>
    <text x="66" y="191" fill="#212121" font-size="11">Set travel notice with bank (call or use app)</text>
  </g>

  <g class="i2">
    <rect x="16" y="212" width="648" height="36" rx="8" fill="white" filter="url(#sh)"/>
    <circle cx="44" cy="230" r="10" fill="#fafafa" stroke="#e0e0e0" stroke-width="1.5"/>
    <text x="66" y="235" fill="#424242" font-size="11">Check foreign transaction fees on your card</text>
  </g>

  <g class="i3">
    <rect x="16" y="256" width="648" height="36" rx="8" fill="white" filter="url(#sh)"/>
    <circle cx="44" cy="274" r="10" fill="#fafafa" stroke="#e0e0e0" stroke-width="1.5"/>
    <text x="66" y="279" fill="#424242" font-size="11">Save international contact number for your bank</text>
    <!-- pulse dot -->
    <circle cx="656" cy="274" r="5" fill="#ffa726" class="pulse"/>
  </g>

  <defs>
    <filter id="sh" x="-2%" y="-8%" width="104%" height="135%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0000001a"/>
    </filter>
  </defs>
</svg>
